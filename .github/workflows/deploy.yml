name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t construction-genai .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image
        run: docker tag construction-genai ${{ secrets.DOCKER_USERNAME }}/construction-genai

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/construction-genai

      - name: Deploy to EC2
        uses: :contentReference[oaicite:1]{index=1}@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/construction-genai
            docker rm -f construction-genai || true
            docker run -d \
              -p 8501:8501 \
              --name construction-genai \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/construction-genai
